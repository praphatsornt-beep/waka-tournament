<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สั่งซื้อการ์ดเกม</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f5f5; color: #333; }

    .header {
      background: #06c755;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .section {
      background: #fff;
      margin: 12px;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .section h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #06c755; }

    /* Catalog */
    .category-title { font-size: 13px; color: #888; font-weight: 600; margin: 8px 0 4px; text-transform: uppercase; }
    .product-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .product-row:last-child { border-bottom: none; }
    .product-name  { flex: 1; font-size: 14px; }
    .product-price { font-size: 13px; color: #888; margin-right: 12px; white-space: nowrap; }
    .qty-ctrl { display: flex; align-items: center; gap: 8px; }
    .qty-ctrl button {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1.5px solid #06c755; background: #fff;
      color: #06c755; font-size: 18px; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .qty-ctrl button:active { background: #e8f9ee; }
    .qty-num { min-width: 20px; text-align: center; font-size: 15px; font-weight: bold; }

    /* Pickup */
    .pickup-options { display: flex; flex-direction: column; gap: 8px; }
    .pickup-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; cursor: pointer; transition: border-color .15s;
    }
    .pickup-option.selected { border-color: #06c755; background: #f0fbf4; }
    .pickup-option input[type=radio] { accent-color: #06c755; }
    .pickup-label { flex: 1; font-size: 14px; }
    .pickup-badge {
      font-size: 12px; color: #888; background: #f5f5f5;
      padding: 2px 6px; border-radius: 4px;
    }
    .pickup-badge.extra { color: #e66; background: #fff0f0; }

    /* Form fields */
    label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; margin-top: 12px; }
    input[type=text] {
      width: 100%; padding: 10px 12px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; outline: none;
    }
    input[type=text]:focus { border-color: #06c755; }

    /* Slip upload */
    .slip-upload {
      border: 2px dashed #ddd; border-radius: 10px;
      padding: 20px; text-align: center; cursor: pointer;
      transition: border-color .15s;
    }
    .slip-upload:hover { border-color: #06c755; }
    .slip-upload input { display: none; }
    #slipPreview { max-width: 100%; border-radius: 8px; margin-top: 10px; display: none; }

    /* Summary bar */
    .summary-bar {
      position: sticky; bottom: 0; background: #fff;
      border-top: 1px solid #eee; padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .summary-total { font-size: 16px; font-weight: bold; }
    .summary-total span { color: #06c755; font-size: 20px; }
    .submit-btn {
      background: #06c755; color: #fff;
      border: none; border-radius: 24px;
      padding: 12px 28px; font-size: 15px; font-weight: bold;
      cursor: pointer; transition: opacity .15s;
    }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }
    .submit-btn:not(:disabled):active { opacity: .8; }

    /* Toast / overlay */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.5); z-index: 100;
      align-items: center; justify-content: center;
    }
    #overlay.show { display: flex; }
    .overlay-card {
      background: #fff; border-radius: 16px;
      padding: 28px 24px; text-align: center;
      max-width: 300px; width: 90%;
    }
    .overlay-icon { font-size: 48px; margin-bottom: 12px; }
    .overlay-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    .overlay-msg { font-size: 14px; color: #555; margin-bottom: 20px; }
    .overlay-close {
      background: #06c755; color: #fff; border: none;
      border-radius: 20px; padding: 10px 28px;
      font-size: 15px; cursor: pointer;
    }

    .spinner { border: 3px solid #eee; border-top-color: #06c755; border-radius: 50%; width: 32px; height: 32px; animation: spin .8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingState { text-align: center; padding: 40px 0; }
    #errorState { display: none; text-align: center; padding: 40px 16px; color: #e44; }
  </style>
</head>
<body>

<div class="header">🎴 สั่งซื้อการ์ดเกม</div>

<div id="loadingState">
  <div class="spinner" style="margin-top:60px"></div>
  <p style="color:#888;margin-top:12px">กำลังโหลด...</p>
</div>
<div id="errorState"></div>

<div id="mainContent" style="display:none; padding-bottom: 80px;">

  <!-- สินค้า -->
  <div class="section">
    <h2>🛒 เลือกสินค้า</h2>
    <div id="catalogContainer"></div>
  </div>

  <!-- รับสินค้า -->
  <div class="section">
    <h2>📍 วิธีรับสินค้า</h2>
    <div class="pickup-options" id="pickupOptions">
      <label class="pickup-option" onclick="selectPickup(this)">
        <input type="radio" name="pickup" value="สาขาต้นสัก" />
        <span class="pickup-label">สาขาต้นสัก</span>
        <span class="pickup-badge">รับฟรี</span>
      </label>
      <label class="pickup-option" onclick="selectPickup(this)">
        <input type="radio" name="pickup" value="สาขาเมืองทอง" />
        <span class="pickup-label">สาขาเมืองทอง</span>
        <span class="pickup-badge">รับฟรี</span>
      </label>
      <label class="pickup-option" onclick="selectPickup(this)">
        <input type="radio" name="pickup" value="สาขาศรีนครินทร์" />
        <span class="pickup-label">สาขาศรีนครินทร์</span>
        <span class="pickup-badge">รับฟรี</span>
      </label>
      <label class="pickup-option" onclick="selectPickup(this)">
        <input type="radio" name="pickup" value="จัดส่งพัสดุ" />
        <span class="pickup-label">จัดส่งพัสดุ</span>
        <span class="pickup-badge extra">+50 บาท</span>
      </label>
    </div>
  </div>

  <!-- ข้อมูลผู้สั่ง -->
  <div class="section">
    <h2>👤 ข้อมูลผู้สั่ง</h2>
    <label>ชื่อ-นามสกุลจริง (ตามที่โอนเงิน) <span style="color:red">*</span></label>
    <input type="text" id="realName" placeholder="เช่น สมชาย ใจดี" />
    <label>ชื่อเล่น / ชื่อในวงการ</label>
    <input type="text" id="nickname" placeholder="เช่น Ash, Pikachu" />
  </div>

  <!-- สลิป -->
  <div class="section">
    <h2>🧾 แนบสลิปโอนเงิน</h2>
    <div class="slip-upload" onclick="document.getElementById('slipInput').click()">
      <input type="file" id="slipInput" accept="image/*" onchange="previewSlip(this)" />
      <div id="slipPlaceholder">📷 กดเพื่อเลือกรูปสลิป</div>
      <img id="slipPreview" />
    </div>
  </div>

</div>

<!-- Summary bar -->
<div class="summary-bar" id="summaryBar" style="display:none">
  <div class="summary-total">ยอดรวม <span id="totalDisplay">0</span> บาท</div>
  <button class="submit-btn" id="submitBtn" onclick="submitOrder()">ยืนยันสั่งซื้อ</button>
</div>

<!-- Result overlay -->
<div id="overlay">
  <div class="overlay-card">
    <div class="overlay-icon" id="overlayIcon">✅</div>
    <div class="overlay-title" id="overlayTitle">สั่งซื้อสำเร็จ</div>
    <div class="overlay-msg"   id="overlayMsg"></div>
    <button class="overlay-close" onclick="closeOverlay()">ปิด</button>
  </div>
</div>

<script>
  // ── Config — เปลี่ยน 2 ค่านี้หลัง deploy ─────────────────────────────────
  const LIFF_ID  = "YOUR_LIFF_ID";          // จาก Line Developers Console
  const GAS_URL  = "YOUR_GAS_WEB_APP_URL";  // จาก GAS Deploy → Web App URL
  // ──────────────────────────────────────────────────────────────────────────

  const DELIVERY_FEE = 50;

  let catalog     = [];
  let quantities  = {};  // { productName: qty }
  let lineProfile = {};
  let slipBase64  = null;

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      lineProfile = await liff.getProfile();
    } catch (e) {
      // ถ้ารันนอก Line ให้ใช้ mock สำหรับ dev
      lineProfile = { userId: "dev_user", displayName: "Dev User" };
    }

    try {
      const res  = await fetch(GAS_URL);
      const data = await res.json();
      catalog    = data.catalog || [];
      renderCatalog();
      document.getElementById("loadingState").style.display = "none";
      document.getElementById("mainContent").style.display  = "block";
      document.getElementById("summaryBar").style.display   = "flex";
    } catch (e) {
      document.getElementById("loadingState").style.display = "none";
      document.getElementById("errorState").style.display   = "block";
      document.getElementById("errorState").textContent     = "โหลดสินค้าไม่ได้ กรุณาลองใหม่: " + e.message;
    }
  }

  // ── Catalog ───────────────────────────────────────────────────────────────
  function renderCatalog() {
    const container = document.getElementById("catalogContainer");
    const byCategory = {};
    for (const p of catalog) {
      const cat = p.category || "อื่นๆ";
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(p);
    }
    for (const [cat, products] of Object.entries(byCategory)) {
      const catEl = document.createElement("div");
      catEl.className = "category-title";
      catEl.textContent = cat;
      container.appendChild(catEl);
      for (const p of products) {
        quantities[p.name] = 0;
        const row = document.createElement("div");
        row.className = "product-row";
        row.innerHTML = `
          <span class="product-name">${p.name}</span>
          <span class="product-price">${p.price.toLocaleString()} บาท</span>
          <div class="qty-ctrl">
            <button onclick="changeQty('${esc(p.name)}', ${p.price}, -1)">−</button>
            <span class="qty-num" id="qty_${esc(p.name)}">0</span>
            <button onclick="changeQty('${esc(p.name)}', ${p.price}, 1)">+</button>
          </div>`;
        container.appendChild(row);
      }
    }
  }

  function esc(s) { return s.replace(/['"\\]/g, "\\$&"); }

  function changeQty(name, price, delta) {
    quantities[name] = Math.max(0, (quantities[name] || 0) + delta);
    document.getElementById("qty_" + name).textContent = quantities[name];
    updateTotal();
  }

  // ── Pickup ────────────────────────────────────────────────────────────────
  function selectPickup(label) {
    document.querySelectorAll(".pickup-option").forEach(l => l.classList.remove("selected"));
    label.classList.add("selected");
    updateTotal();
  }

  function getPickup() {
    const r = document.querySelector('input[name="pickup"]:checked');
    return r ? r.value : null;
  }

  // ── Total ─────────────────────────────────────────────────────────────────
  function updateTotal() {
    let total = 0;
    for (const [name, qty] of Object.entries(quantities)) {
      if (qty > 0) {
        const p = catalog.find(p => p.name === name);
        if (p) total += p.price * qty;
      }
    }
    if (getPickup() === "จัดส่งพัสดุ") total += DELIVERY_FEE;
    document.getElementById("totalDisplay").textContent = total.toLocaleString();
    return total;
  }

  // ── Slip preview ──────────────────────────────────────────────────────────
  function previewSlip(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById("slipPreview");
      img.src = e.target.result;
      img.style.display = "block";
      document.getElementById("slipPlaceholder").style.display = "none";
      // เก็บแค่ base64 ไม่รวม data:image/...;base64,
      slipBase64 = e.target.result.split(",")[1];
    };
    reader.readAsDataURL(file);
  }

  // ── Submit ────────────────────────────────────────────────────────────────
  async function submitOrder() {
    const items = [];
    for (const [name, qty] of Object.entries(quantities)) {
      if (qty > 0) {
        const p = catalog.find(p => p.name === name);
        if (p) items.push({ name, qty, price: p.price });
      }
    }

    if (items.length === 0)      { alert("กรุณาเลือกสินค้าอย่างน้อย 1 รายการ"); return; }
    if (!getPickup())            { alert("กรุณาเลือกวิธีรับสินค้า"); return; }
    if (!document.getElementById("realName").value.trim()) { alert("กรุณากรอกชื่อ-นามสกุลจริง"); return; }
    if (!slipBase64)             { alert("กรุณาแนบสลิปโอนเงิน"); return; }

    const btn = document.getElementById("submitBtn");
    btn.disabled    = true;
    btn.textContent = "กำลังส่ง...";

    const total = updateTotal();
    const body  = {
      lineUserId:  lineProfile.userId,
      displayName: lineProfile.displayName,
      items,
      total,
      pickup:      getPickup(),
      realName:    document.getElementById("realName").value.trim(),
      nickname:    document.getElementById("nickname").value.trim(),
      slipBase64,
    };

    try {
      const res  = await fetch(GAS_URL, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify(body),
      });
      const data = await res.json();

      if (data.success) {
        showOverlay("✅", "สั่งซื้อสำเร็จ!",
          `เลขออเดอร์: ${data.orderId}\nสถานะสลิป: ${data.slipStatus}\n\nเราจะแจ้งให้ทราบเมื่อของพร้อม`);
      } else {
        showOverlay("❌", "เกิดข้อผิดพลาด", data.error || "กรุณาลองใหม่อีกครั้ง");
      }
    } catch (e) {
      showOverlay("❌", "ส่งออเดอร์ไม่ได้", "กรุณาตรวจสอบ Internet แล้วลองใหม่");
    }

    btn.disabled    = false;
    btn.textContent = "ยืนยันสั่งซื้อ";
  }

  // ── Overlay ───────────────────────────────────────────────────────────────
  function showOverlay(icon, title, msg) {
    document.getElementById("overlayIcon").textContent  = icon;
    document.getElementById("overlayTitle").textContent = title;
    document.getElementById("overlayMsg").textContent   = msg;
    document.getElementById("overlay").classList.add("show");
  }

  function closeOverlay() {
    document.getElementById("overlay").classList.remove("show");
    if (liff.isInClient()) liff.closeWindow();
  }

  init();
</script>
</body>
</html>
